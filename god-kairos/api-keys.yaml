# GOD KAIROS — API Key Pool Completo
# Todas as keys do operador consolidadas em um único lugar

# Gemini (Google AI Studio) — 5 keys, round-robin
gemini:
  provider: "google-ai-studio"
  model_default: "gemini-2.5-pro"
  rotation: "round-robin"
  fallback_on_429: true
  keys:
    - id: "lemellomodel"
      key: "REDACTED"
    - id: "krauserg31"
      key: "REDACTED"
    - id: "brooklynalexia2025"
      key: "REDACTED"
    - id: "redfield20251"
      key: "REDACTED"
    - id: "redfield20252"
      key: "REDACTED"
  rate_limits:
    per_key_rpm: 15
    pool_total_rpm: 75

# Groq — 2 keys, round-robin (fallback)
groq:
  provider: "groq"
  model_default: "llama-3.1-8b-instant"
  model_heavy: "llama-3.3-70b-versatile"
  rotation: "round-robin"
  role: "fallback"
  keys:
    - id: "groq-1"
      key: "REDACTED"
    - id: "groq-2"
      key: "REDACTED"
  rate_limits:
    per_key_rpm: 30
    pool_total_rpm: 60

# HuggingFace — Inference Router
huggingface:
  provider: "huggingface"
  model_default: "HauhauCS/Qwen3.5-35B-A3B-Uncensored-HauhauCS-Aggressive"
  role: "uncensored"
  keys:
    - id: "hf-main"
      key: "" # Preencher com HF token
  rate_limits:
    per_key_rpm: 10

# Red Hat OpenShift AI — Inference Server
redhat:
  provider: "redhat"
  role: "sovereign"
  endpoint: "" # Ex: https://inference.apps.openshift.example.com/v1
  model_default: "qwen3.5-40b-thinking"
  keys:
    - id: "internal"
      key: "" # Preencher se auth via bearer for necessário

# Opus 4.6 (Antigravity) — free tier, este terminal
opus:
  provider: "antigravity"
  model: "opus-4.6"
  role: "heavy"
  notes: "Sem key necessária — roda nativamente neste terminal"

# Token Routing
routing:
  complexity_1_2:
    provider: "groq"
    model: "llama-3.1-8b-instant"
    use_for: ["chat rápido", "formatação", "queries simples"]
  complexity_3_4:
    provider: "gemini"
    model: "gemini-2.5-pro"
    use_for: ["coding", "análise", "refatoração", "debugging"]
  complexity_5:
    provider: "opus"
    model: "opus-4.6"
    use_for: ["arquitetura", "planning estratégico", "decisões críticas", "RPs"]
